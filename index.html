<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema Distribuído</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Painel de Controle</h1>
            <span class="badge">Servidor 1: Frontend (Porta 3000)</span>
        </header>

        <div class="card">
            <h2>Novo Produto</h2>
            <div class="form-group">
                <div class="input-row">
                    <input type="text" id="nome" placeholder="Nome do item (ex: Latas de Alumínio)">
                    <input type="number" id="qtd" placeholder="Qtd" min="0">
                </div>
                <button onclick="cadastrarProduto()">Cadastrar no Banco</button>
            </div>
        </div>

        <div class="card">
            <h2>Dados da API <small style="color: var(--text-muted); font-size: 0.8rem; font-weight: normal;">(Porta 5000)</small></h2>
            <ul id="lista-produtos">
                </ul>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/produtos';

        async function carregarProdutos() {
            try {
                const resposta = await fetch(API_URL);
                const produtos = await resposta.json();
                const lista = document.getElementById('lista-produtos');
                lista.innerHTML = '';
                
                if (produtos.length === 0) {
                    lista.innerHTML = '<div class="empty-state">Nenhum produto armazenado no arquivo JSON.</div>';
                    return;
                }

                produtos.forEach(p => {
                    lista.innerHTML += `
                        <li>
                            <div class="prod-info">
                                <span class="prod-name">${p.nome}</span>
                                <span class="prod-id">ID: ${p.id}</span>
                            </div>
                            <span class="prod-qtd">${p.quantidade} un</span>
                        </li>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-produtos').innerHTML = `
                    <div class="empty-state" style="color: #ef4444;">
                        ERRO: Não foi possível conectar ao Servidor 2 (API na Porta 5000).
                    </div>`;
            }
        }

        async function cadastrarProduto() {
            const nomeInput = document.getElementById('nome');
            const qtdInput = document.getElementById('qtd');

            if (!nomeInput.value || !qtdInput.value) {
                alert('Preencha todos os campos!');
                return;
            }

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nome: nomeInput.value, 
                        quantidade: parseInt(qtdInput.value) 
                    })
                });

                nomeInput.value = '';
                qtdInput.value = '';
                carregarProdutos();
            } catch (error) {
                alert('Erro ao enviar dados. O backend está rodando?');
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
